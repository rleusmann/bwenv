# Einmalig pro Clone aktivieren: pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-fmt # gofmt + goimports (formatiert direkt)
      - id: golangci-lint # Linter auf den geänderten Dateien
