version: 2

project_name: bwenv

builds:
  # darwin mit cgo: Touch ID (LocalAuthentication/Security.framework)
  # funktioniert nur in cgo-Builds → läuft auf einem macOS-Runner.
  - id: bwenv-darwin
    main: ./cmd/bwenv
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/rleusmann/bwenv/internal/cli.Version={{.Version}}

  # linux statisch (kein Touch ID → cgo unnötig), Cross-Compile vom macOS-Runner.
  - id: bwenv-linux
    main: ./cmd/bwenv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/rleusmann/bwenv/internal/cli.Version={{.Version}}

archives:
  - formats: [tar.gz]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
