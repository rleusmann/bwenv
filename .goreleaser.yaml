version: 2

project_name: bwenv

builds:
  # darwin mit cgo: Touch ID (LocalAuthentication/Security.framework)
  # funktioniert nur in cgo-Builds → läuft auf einem macOS-Runner.
  - id: bwenv-darwin
    main: ./cmd/bwenv
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/rleusmann/bwenv/internal/cli.Version={{.Version}}

  # linux statisch (kein Touch ID → cgo unnötig), Cross-Compile vom macOS-Runner.
  - id: bwenv-linux
    main: ./cmd/bwenv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/rleusmann/bwenv/internal/cli.Version={{.Version}}

archives:
  - formats: [tar.gz]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: bwenv
    repository:
      owner: rleusmann
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/rleusmann/bwenv
    description: Inject Vaultwarden/Bitwarden secrets as environment variables (direnv-style)
    dependencies:
      - formula: bitwarden-cli
    caveats: |
      Enable the shell integration by adding this to your ~/.zshrc:
        eval "$(bwenv hook zsh)"

      Then allow project directories once with `bwenv allow`
      and unlock once per boot with `bwenv unlock`.
    # Unsignierte Binaries: Quarantäne-Flag nach der Installation entfernen,
    # sonst blockiert Gatekeeper den ersten Start.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/bwenv"]
          end
