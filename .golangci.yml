version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - gosec
    - unconvert
  exclusions:
    rules:
      # Tests arbeiten mit Temp-Pfaden und Fixture-"Credentials".
      - path: _test\.go
        linters:
          - gosec
      # Test-Scaffolding für den E2E-Test (Registrierungs-Krypto,
      # selbstsigniertes Test-Zertifikat) — kein Produkt-Code.
      - path: internal/integration/
        linters:
          - gosec
